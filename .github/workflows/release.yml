name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    env:
      CARGO: cargo
      CROSS_VERSION: v0.2.5
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vim-rogue-x86_64-linux
            strip: strip
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: vim-rogue-aarch64-linux
            strip: aarch64-linux-gnu-strip
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: vim-rogue-x86_64-macos
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: vim-rogue-aarch64-macos
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: vim-rogue-x86_64-windows
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            artifact: vim-rogue-aarch64-windows
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Use Cross
        if: matrix.os == 'ubuntu-latest'
        run: |
          dir="$RUNNER_TEMP/cross-download"
          mkdir "$dir"
          echo "$dir" >> $GITHUB_PATH
          cd "$dir"
          curl -LO "https://github.com/cross-rs/cross/releases/download/$CROSS_VERSION/cross-x86_64-unknown-linux-musl.tar.gz"
          tar xf cross-x86_64-unknown-linux-musl.tar.gz
          echo "CARGO=cross" >> $GITHUB_ENV
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: ${{ env.CARGO }} build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux)
        if: runner.os == 'Linux'
        run: |
          docker run --rm -v "$PWD/target:/target:Z" \
            "ghcr.io/cross-rs/${{ matrix.target }}:main" \
            "${{ matrix.strip }}" \
            "/target/${{ matrix.target }}/release/vim-rogue"
      - name: Strip binary (macOS)
        if: runner.os == 'macOS'
        run: strip target/${{ matrix.target }}/release/vim-rogue

      - name: Package (tar.gz)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz vim-rogue
      - name: Package (zip)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/vim-rogue.exe" -DestinationPath "${{ matrix.artifact }}.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: List artifacts
        run: find artifacts -type f | sort
      - name: Extract changelog for this version
        id: changelog
        run: |
          # Strip leading 'v' from tag to match CHANGELOG format ([X.Y.Z])
          VERSION="${GITHUB_REF_NAME#v}"
          # Extract the section for this version: from "## [VERSION]" to the next "## [" or EOF
          sed -n "/^## \[${VERSION}\]/,/^## \[/{/^## \[/!p}" CHANGELOG.md > release_body.md
          echo "Extracted changelog for ${VERSION}:"
          cat release_body.md
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          body_path: release_body.md
